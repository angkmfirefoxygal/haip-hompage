# Nginx config for haip.kr
# 위치: /etc/nginx/conf.d/haip.conf
# 주의: 이 파일을 서버에 cp할 경우 nginx reload 필요
# 주의: certbot이 HTTPS 블록을 관리하므로, cp 후 certbot 설정이 덮어써질 수 있음

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name haip.kr www.haip.kr;
    return 301 https://$host$request_uri;
}

# HTTPS (Let's Encrypt 인증서 적용됨)
server {
    listen 443 ssl http2;
    server_name haip.kr www.haip.kr;

    ssl_certificate /etc/letsencrypt/live/haip.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/haip.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/haip;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # HTML: 항상 최신 버전 확인
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # CSS/JS: 변경 감지 (ETag 기반, 변경 없으면 304)
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # 이미지/폰트: 장기 캐시 (자주 안 바뀜)
    location ~* \.(woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-like routing (each html file)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000" always;
}
