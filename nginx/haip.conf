# Nginx config for haip.kr
# 위치: /etc/nginx/sites-available/haip.conf
# 심볼릭 링크: sudo ln -s /etc/nginx/sites-available/haip.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name haip.kr www.haip.kr;

    # HTTP → HTTPS redirect (SSL 설정 후 주석 해제)
    # return 301 https://$host$request_uri;

    root /var/www/haip;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-like routing (each html file)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

